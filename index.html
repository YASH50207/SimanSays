<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Cat Fact Explorer</title>
    <style>
        /* 1. Global Reset & Background */
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
        }

        body {
            /* A vibrant, modern gradient */
            background: linear-gradient(135deg, #4eff02 0%, #e306eb 100%);
            height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            overflow: hidden;
        }

        /* 2. The Glass Card Container */
        .card {
            background: rgba(255, 255, 255, 0.15);
            backdrop-filter: blur(15px);
            /* This creates the frosted glass effect */
            -webkit-backdrop-filter: blur(15px);
            border: 1px solid rgba(255, 255, 255, 0.2);
            border-radius: 20px;
            padding: 40px;
            width: 90%;
            max-width: 500px;
            text-align: center;
            box-shadow: 0 8px 32px 0 rgba(31, 38, 135, 0.37);
        }

        /* 3. Typography */
        h1 {
            color: #ffffff;
            font-size: 2rem;
            margin-bottom: 20px;
            text-transform: uppercase;
            letter-spacing: 2px;
            text-shadow: 0 2px 4px rgba(0, 0, 0, 0.2);
        }

        #heading {
            color: #f1f1f1;
            font-size: 1.2rem;
            line-height: 1.6;
            min-height: 80px;
            /* Prevents the card from jumping size */
            margin-bottom: 30px;
            font-style: italic;
            /* Smooth transition for when text changes */
            transition: all 0.5s ease;
        }

        /* 4. Button Styling */
        button {
            background: #ffffff;
            color: #0415ac;
            border: none;
            padding: 15px 35px;
            font-size: 1rem;
            font-weight: bold;
            border-radius: 50px;
            cursor: pointer;
            transition: all 0.3s ease;
            box-shadow: 0 4px 15px rgba(0, 0, 0, 0.2);
        }

        button:hover {
            transform: scale(1.05);
            background: #fdfdfd;
            box-shadow: 0 6px 20px rgba(0, 0, 0, 0.3);
        }

        button:active {
            transform: scale(0.98);
        }

        /* 5. Subtle Animation for new facts */
        @keyframes fadeIn {
            from {
                opacity: 0;
                transform: translateY(10px);
            }

            to {
                opacity: 1;
                transform: translateY(0);
            }
        }

        .new-fact {
            animation: fadeIn 0.6s ease-out;
        }
    </style>
</head>

<body>

    <div class="card">


        <h2>🐱 Cat Facts</h2>
        <h1></h1>

        <button onclick="getcatfact2()">Next Fact</button>
    </div>

    <script src="main.js"></script>

</body>

</html>
